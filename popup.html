<!DOCTYPE html>
<html>
<head>
  <style>
    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
      background-color: #ccc;
      color: white;
    }

    .active-start {
      background-color: green;
    }

    .active-stop {
      background-color: red;
    }
  </style>
</head>
<body>
  <button id="start">Start</button>
  <button id="stop">Stop</button>

  <script src="popup.js"></script>
</body>
</html>
